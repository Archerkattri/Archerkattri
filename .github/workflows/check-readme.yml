name: check-readme

# Guard: if a PR edits the curated numbers (data.json) or the generator without
# regenerating README.md, fail so the README never drifts from its sources.
# live.json is committed, so the live.* regions resolve here too.

on:
  pull_request:
    paths:
      - README.md
      - data.json
      - live.json
      - gen_readme.py
      - fetch_stats.py

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: README.md is in sync with data.json + live.json
        run: python gen_readme.py --check
