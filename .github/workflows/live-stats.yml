name: live-stats

# Keeps assets/stats.svg genuinely live, entirely on GitHub's servers (nothing runs
# on a personal machine). It re-renders the card and commits it ONLY when a number
# changed, so the history doesn't fill with no-op commits.
#
# Cadence = the fastest a GitHub profile can honestly refresh:
#   - schedule: every 5 minutes (GitHub Actions' minimum cron)
#   - watch/started: the instant someone stars this repo
#   - push / manual: on demand
# True to-the-second real time is impossible here: GitHub caches the rendered README
# and proxies images. Committing the numbers (instead of using a cached widget image)
# is what makes them actually change when they change.

on:
  schedule:
    - cron: "*/5 * * * *"
  watch:
    types: [started]
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - scripts/update_stats.py
      - .github/workflows/live-stats.yml

permissions:
  contents: write

# One run at a time; don't cancel a run that may be mid-commit.
concurrency:
  group: live-stats
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render the live stats card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: Archerkattri
        run: python scripts/update_stats.py

      - name: Commit only if a number changed
        run: |
          if git diff --quiet -- assets/stats.svg assets/stats.json; then
            echo "No stat change; nothing to commit."
            exit 0
          fi
          git config user.name "Krishi Attri"
          git config user.email "krishiattriwork@gmail.com"
          git add assets/stats.svg assets/stats.json
          git commit -m "Live stats sync"
          git push
