<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Krishi Attri: robotics, perception, verifiable AI tools">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1b1e24" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="22%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3ebfc6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3ebfc6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ebfc6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3ebfc6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3ebfc6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="#0C0D10"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="6s" repeatCount="indefinite"/>
  </rect>
  <!-- instrument scan sweep -->
  <rect x="0" y="-70" width="1280" height="70" fill="url(#scan)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 392" dur="7.5s" repeatCount="indefinite"/>
  </rect>
  <!-- registration marks -->
  <g stroke="#3ebfc6" stroke-width="1.4" opacity="0.85">
    <path d="M 24 12 v 16 M 16 20 h 16"/>
    <path d="M 1256 12 v 16 M 1248 20 h 16"/>
    <path d="M 24 292 v 16 M 16 300 h 16"/>
    <path d="M 1256 292 v 16 M 1248 300 h 16"/>
  </g>
  <!-- constellation: home + four stations, echoing the portfolio grid -->
  <g transform="translate(1020,160)">
    <g stroke="#2a6f74" stroke-width="1.2" fill="none">
      <path d="M 0 0 L 0 -78 M 0 0 L 118 0 M 0 0 L -118 0 M 0 0 L 0 78">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="5s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- radar ping from home -->
    <circle cx="0" cy="0" r="7" fill="none" stroke="#3ebfc6" stroke-width="1.5">
      <animate attributeName="r" values="7;26" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="7" fill="#3ebfc6">
      <animate attributeName="r" values="7;8.6;7" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-78" r="4.5" fill="none" stroke="#3ebfc6" stroke-width="1.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="0" r="4.5" fill="none" stroke="#3ebfc6" stroke-width="1.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-118" cy="0" r="4.5" fill="none" stroke="#3ebfc6" stroke-width="1.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="78" r="4.5" fill="none" stroke="#3ebfc6" stroke-width="1.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="2.25s" repeatCount="indefinite"/>
    </circle>
    <g fill="#5a6470" font-family="ui-monospace,Menlo,monospace" font-size="11">
      <text x="14" y="-74">research</text>
      <text x="64" y="-10">software</text>
      <text x="-116" y="-10" text-anchor="end" dx="-8">experience</text>
      <text x="14" y="92">contact</text>
    </g>
  </g>
  <!-- type -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="80" y="148" fill="#E9E4D6" font-size="58" font-weight="600">Krishi Attri</text>
    <text x="80" y="196" fill="#3ebfc6" font-size="26" font-style="italic">I give robots a sense of touch.</text>
  </g>
  <g font-family="ui-monospace,Menlo,monospace" font-size="14" fill="#8a93a0">
    <text x="80" y="244">VISUO-TACTILE SLAM · 3D GAUSSIAN SPLATTING · VERIFIABLE AI TOOLING</text>
    <text x="80" y="270">SNU SRBL → UCF</text>
  </g>
  <!-- accent underline draws in on load -->
  <line x1="80" y1="212" x2="560" y2="212" stroke="#3ebfc6" stroke-width="1.6" stroke-dasharray="480" stroke-dashoffset="480">
    <animate attributeName="stroke-dashoffset" from="480" to="0" dur="1.8s" begin="0.2s" fill="freeze"/>
  </line>
</svg>
